<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Code MSG</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --border: #2a2a3a;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --text2: #888899;
    --danger: #ff4466;
    --msg-bg: #16161f;
    --sidebar-w: 240px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ── AUTH ── */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  #auth-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
  }

  #auth-screen::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,255,136,0.1) 0%, transparent 70%);
    bottom: -50px; right: -50px;
    pointer-events: none;
  }

  .auth-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 80px rgba(0,0,0,0.5);
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .auth-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .auth-logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .auth-logo-text {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .auth-logo-text span { color: var(--accent); }

  .auth-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg3);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .auth-tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    border-radius: 7px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    transition: all 0.2s;
    font-family: 'Syne', sans-serif;
    border: none;
    background: none;
  }

  .auth-tab.active {
    background: var(--bg2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .auth-form { display: flex; flex-direction: column; gap: 16px; }

  .input-group { display: flex; flex-direction: column; gap: 6px; }

  .input-group label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  .input-group input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Syne', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus { border-color: var(--accent2); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), #5b21b6);
    border: none;
    border-radius: 8px;
    padding: 13px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .auth-msg {
    font-size: 13px;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    display: none;
  }

  .auth-msg.error { background: rgba(255,68,102,0.15); color: var(--danger); display: block; }
  .auth-msg.success { background: rgba(0,255,136,0.1); color: var(--accent); display: block; }

  /* ── APP ── */
  #app { display: none; height: 100vh; flex-direction: row; }
  #app.visible { display: flex; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .sidebar-title {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .sidebar-title span { color: var(--accent); }

  .channels-section { flex: 1; overflow-y: auto; padding: 12px 8px; }

  .channels-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 8px 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    transition: all 0.15s;
    margin-bottom: 2px;
  }

  .channel-item:hover { background: var(--bg3); color: var(--text); }
  .channel-item.active { background: rgba(124,58,237,0.2); color: var(--text); }
  .channel-item.active .ch-hash { color: var(--accent); }

  .ch-hash {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--text2);
    transition: color 0.15s;
  }

  .sidebar-user {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-status { font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

  .btn-logout {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text2);
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .btn-logout:hover { color: var(--danger); background: rgba(255,68,102,0.1); }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
  }

  .chat-header-hash {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    color: var(--accent);
  }

  .chat-header-name { font-size: 16px; font-weight: 700; }

  .chat-header-desc { font-size: 13px; color: var(--text2); margin-left: auto; font-family: 'JetBrains Mono', monospace; }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-group { margin-bottom: 16px; }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }

  .msg-author {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }

  .msg-time {
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  .msg-content {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    padding-left: 2px;
    word-break: break-word;
  }

  .msg-bubble {
    background: var(--msg-bg);
    border-left: 2px solid var(--border);
    padding: 8px 14px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 2px;
    transition: background 0.15s;
  }

  .msg-bubble:hover { background: var(--bg3); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    color: var(--text2);
  }

  .empty-icon { font-size: 48px; }
  .empty-text { font-size: 16px; font-weight: 600; }
  .empty-sub { font-size: 13px; font-family: 'JetBrains Mono', monospace; }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within { border-color: var(--accent2); }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Syne', sans-serif;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }

  #msg-input::placeholder { color: var(--text2); }

  .btn-send {
    background: linear-gradient(135deg, var(--accent2), #5b21b6);
    border: none;
    border-radius: 7px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-send:hover { opacity: 0.85; transform: scale(1.05); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Verify email notice */
  .verify-notice {
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--accent);
    line-height: 1.5;
    display: none;
  }

  .verify-notice.show { display: block; }

  /* Loading spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Typing indicator */
  .online-count {
    font-size: 11px;
    color: var(--text2);
    padding: 4px 24px 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .online-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Scrollbar */
  .channels-section::-webkit-scrollbar { width: 4px; }
  .channels-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <div class="auth-logo-text">Code <span>MSG</span></div>
    </div>

    <div class="verify-notice" id="verify-notice">
      ✅ Conta criada! Verifique seu email e clique no link de confirmação antes de fazer login.
    </div>

    <div class="auth-form" id="auth-form">
      <div class="input-group" id="username-group" style="display:none">
        <label>Nome de usuário</label>
        <input type="text" id="username-input" placeholder="ex: henrique" maxlength="20"/>
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email-input" placeholder="seu@email.com"/>
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="password-input" placeholder="••••••••"/>
      </div>
      <div class="auth-msg" id="auth-msg"></div>
      <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Entrar</button>
      <p id="switch-link" style="text-align:center; margin-top:12px; font-size:14px; color:var(--text2);">
        Não tem conta? <a href="#" onclick="switchTab('register'); return false;" id="switch-anchor" style="color:var(--accent); font-weight:700; text-decoration:none;">Criar uma conta</a>
      </p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">💬</div>
      <div class="sidebar-title">Code <span>MSG</span></div>
    </div>

    <div class="channels-section">
      <div class="channels-label">Canais</div>
      <div id="channels-list"></div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name-display">...</div>
        <div class="user-status">● online</div>
      </div>
      <button class="btn-logout" onclick="logout()" title="Sair">⏏</button>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <span class="chat-header-hash">#</span>
      <span class="chat-header-name" id="current-channel-name">geral</span>
      <span class="chat-header-desc" id="msg-count">0 mensagens</span>
    </div>

    <div class="messages" id="messages-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-text">Nenhuma mensagem ainda</div>
        <div class="empty-sub">Seja o primeiro a falar!</div>
      </div>
    </div>

    <div class="online-count"><span class="online-dot"></span>Tempo real ativo</div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="msg-input" rows="1" placeholder="Mensagem em #geral..."></textarea>
        <button class="btn-send" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG SUPABASE ──
const SUPABASE_URL = 'https://bfqrnlfwgxwfjvbzmsgs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcXJubGZ3Z3h3Zmp2Ynptc2dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTM0ODYsImV4cCI6MjA4OTc2OTQ4Nn0.QW_WChY96bAC7uHZyzitNFebTYoyDeuDf3UbYVKxYV0';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;
let currentChannel = null;
let channels = [];
let realtimeSub = null;
let currentTab = 'login';

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('username-group').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('auth-btn').textContent = tab === 'login' ? 'Entrar' : 'Criar conta';

  const switchLink = document.getElementById('switch-link');
  if (tab === 'login') {
    switchLink.innerHTML = 'Não tem conta? <span id="switch-anchor" style="color:var(--accent);font-weight:700;cursor:pointer;text-decoration:underline;">Criar uma conta</span>';
  } else {
    switchLink.innerHTML = 'Já tem conta? <span id="switch-anchor" style="color:var(--accent);font-weight:700;cursor:pointer;text-decoration:underline;">Entrar</span>';
  }
  document.getElementById('switch-anchor').addEventListener('click', function() {
    switchTab(tab === 'login' ? 'register' : 'login');
  });
  clearMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'auth-msg ' + type;
}

function clearMsg() {
  const el = document.getElementById('auth-msg');
  el.className = 'auth-msg';
}

// ── AUTH ──
async function handleAuth() {
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const btn = document.getElementById('auth-btn');

  if (!email || !password) { showMsg('Preencha email e senha!', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  if (currentTab === 'register') {
    const username = document.getElementById('username-input').value.trim();
    if (!username) { showMsg('Escolha um nome de usuário!', 'error'); btn.disabled=false; btn.textContent='Criar conta'; return; }
    if (username.length < 3) { showMsg('Nome muito curto (mínimo 3 letras)', 'error'); btn.disabled=false; btn.textContent='Criar conta'; return; }

    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) { showMsg(error.message, 'error'); btn.disabled=false; btn.textContent='Criar conta'; return; }

    if (data.user) {
      // Salvar username
      await supabase.from('profiles').insert({ id: data.user.id, username });
    }

    document.getElementById('verify-notice').classList.add('show');
    switchTab('login');
    showMsg('Verifique seu email para confirmar a conta!', 'success');
    btn.disabled=false; btn.textContent='Entrar';

  } else {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { showMsg('Email ou senha incorretos!', 'error'); btn.disabled=false; btn.textContent='Entrar'; return; }
    await initApp(data.user);
  }
}

// ── INIT APP ──
async function initApp(user) {
  currentUser = user;

  // Buscar perfil
  const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;

  // UI
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-name-display').textContent = profile?.username || user.email;
  document.getElementById('user-avatar').textContent = (profile?.username || user.email)[0].toUpperCase();

  // Carregar canais
  await loadChannels();

  // Enter to send
  document.getElementById('msg-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  document.getElementById('msg-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
}

// ── CHANNELS ──
async function loadChannels() {
  const { data } = await supabase.from('channels').select('*').order('created_at');
  channels = data || [];

  const list = document.getElementById('channels-list');
  list.innerHTML = '';

  channels.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'channel-item';
    el.dataset.id = ch.id;
    el.innerHTML = `<span class="ch-hash">#</span><span>${ch.name}</span>`;
    el.onclick = () => selectChannel(ch);
    list.appendChild(el);
  });

  if (channels.length > 0) selectChannel(channels[0]);
}

async function selectChannel(channel) {
  currentChannel = channel;

  document.querySelectorAll('.channel-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === channel.id);
  });

  document.getElementById('current-channel-name').textContent = channel.name;
  document.getElementById('msg-input').placeholder = `Mensagem em #${channel.name}...`;

  await loadMessages();
  subscribeRealtime();
}

// ── MESSAGES ──
async function loadMessages() {
  const { data } = await supabase
    .from('messages')
    .select('*, profiles(username)')
    .eq('channel_id', currentChannel.id)
    .order('created_at', { ascending: true })
    .limit(100);

  renderMessages(data || []);
}

function renderMessages(msgs) {
  const container = document.getElementById('messages-container');
  const emptyState = document.getElementById('empty-state');

  document.getElementById('msg-count').textContent = msgs.length + ' mensagens';

  if (msgs.length === 0) {
    emptyState.style.display = 'flex';
    // Clear previous messages but keep empty state
    const oldMsgs = container.querySelectorAll('.msg-group');
    oldMsgs.forEach(m => m.remove());
    return;
  }

  emptyState.style.display = 'none';
  const oldMsgs = container.querySelectorAll('.msg-group');
  oldMsgs.forEach(m => m.remove());

  let lastAuthor = null;
  msgs.forEach(msg => {
    const author = msg.profiles?.username || 'Usuário';
    const time = new Date(msg.created_at).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    const isMe = msg.user_id === currentUser?.id;

    const group = document.createElement('div');
    group.className = 'msg-group';

    if (lastAuthor !== msg.user_id) {
      group.innerHTML = `
        <div class="msg-header">
          <span class="msg-author" style="color:${isMe ? 'var(--accent)' : '#a78bfa'}">${author}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-bubble">
          <div class="msg-content">${escapeHtml(msg.content)}</div>
        </div>
      `;
    } else {
      group.innerHTML = `
        <div class="msg-bubble">
          <div class="msg-content">${escapeHtml(msg.content)}</div>
        </div>
      `;
    }

    container.appendChild(group);
    lastAuthor = msg.user_id;
  });

  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SEND ──
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !currentChannel || !currentUser) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  const { error } = await supabase.from('messages').insert({
    channel_id: currentChannel.id,
    user_id: currentUser.id,
    content
  });

  if (!error) {
    input.value = '';
    input.style.height = 'auto';
  }

  btn.disabled = false;
  input.focus();
}

// ── REALTIME ──
function subscribeRealtime() {
  if (realtimeSub) supabase.removeChannel(realtimeSub);

  realtimeSub = supabase
    .channel('messages-' + currentChannel.id)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: `channel_id=eq.${currentChannel.id}`
    }, async (payload) => {
      // Buscar perfil do autor
      const { data: profile } = await supabase
        .from('profiles')
        .select('username')
        .eq('id', payload.new.user_id)
        .single();

      const msg = { ...payload.new, profiles: profile };
      appendMessage(msg);
    })
    .subscribe();
}

function appendMessage(msg) {
  const container = document.getElementById('messages-container');
  document.getElementById('empty-state').style.display = 'none';

  const author = msg.profiles?.username || 'Usuário';
  const time = new Date(msg.created_at).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  const isMe = msg.user_id === currentUser?.id;

  const group = document.createElement('div');
  group.className = 'msg-group';
  group.innerHTML = `
    <div class="msg-header">
      <span class="msg-author" style="color:${isMe ? 'var(--accent)' : '#a78bfa'}">${author}</span>
      <span class="msg-time">${time}</span>
    </div>
    <div class="msg-bubble">
      <div class="msg-content">${escapeHtml(msg.content)}</div>
    </div>
  `;

  container.appendChild(group);
  container.scrollTop = container.scrollHeight;

  // Update count
  const countEl = document.getElementById('msg-count');
  const current = parseInt(countEl.textContent) || 0;
  countEl.textContent = (current + 1) + ' mensagens';
}

// ── LOGOUT ──
async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  currentProfile = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('messages-container').innerHTML = '';
  document.getElementById('channels-list').innerHTML = '';
}

// ── AUTO LOGIN ──
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session?.user) initApp(session.user);
});

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session?.user && !currentUser) {
    initApp(session.user);
  }
});

// Inicializa o link de trocar tela
document.getElementById('switch-anchor').addEventListener('click', function() {
  switchTab('register');
});
</script>
