<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Code MSG</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --border: #2a2a3a;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --text2: #888899;
    --danger: #ff4466;
    --msg-bg: #16161f;
    --sidebar-w: 240px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  #auth-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
  }

  #auth-screen::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,255,136,0.1) 0%, transparent 70%);
    bottom: -50px; right: -50px;
    pointer-events: none;
  }

  .auth-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 80px rgba(0,0,0,0.5);
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .auth-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .auth-logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .auth-logo-text { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .auth-logo-text span { color: var(--accent); }

  .auth-form { display: flex; flex-direction: column; gap: 16px; }

  .input-group { display: flex; flex-direction: column; gap: 6px; }

  .input-group label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  .input-group input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Syne', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus { border-color: var(--accent2); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), #5b21b6);
    border: none;
    border-radius: 8px;
    padding: 13px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .auth-msg {
    font-size: 13px;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    display: none;
  }

  .auth-msg.error { background: rgba(255,68,102,0.15); color: var(--danger); display: block; }
  .auth-msg.success { background: rgba(0,255,136,0.1); color: var(--accent); display: block; }

  .switch-text {
    text-align: center;
    font-size: 14px;
    color: var(--text2);
  }

  .switch-text button {
    background: none;
    border: none;
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
    font-family: 'Syne
